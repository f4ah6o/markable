name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build package
        run: pnpm build
      - name: Build Todo demo
        run: pnpm --filter @f12o/markable-vite-todo-demo build
      - name: Build shadcn-admin demo
        run: pnpm --filter @f12o/markable-shadcn-admin-demo build
      - name: Prepare Pages artifact
        shell: bash
        run: |
          rm -rf pages-dist
          mkdir -p pages-dist/vue-todo pages-dist/shadcn-admin
          cp -R examples/vite-todo/dist/. pages-dist/vue-todo/
          cp -R examples/shadcn-admin/dist/. pages-dist/shadcn-admin/
          node scripts/build-pages-index.mjs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
